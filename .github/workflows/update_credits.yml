name: Update Credits Stats

on:
  schedule:
    - cron: '0 0 * * *' # S'exécute tous les jours à minuit UTC
  workflow_dispatch: # Permet de lancer l'action manuellement depuis l'interface GitHub

permissions:
  contents: write # Autorise le robot à écrire et pousser sur le dépôt

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Lancer le script de mise à jour des statistiques
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_contributors.py

      - name: Commit et Push des changements (si modifications)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CREDITS.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: mise à jour quotidienne des statistiques des contributeurs" && git push)
